# 目标项目。关联路径：
# - impl/projects/<project_id>/project.yaml
# - impl/projects/<project_id>/<role>.py
# - impl/projects/<project_id>/draft/<role>.py
project_id: "<project>"

# 优化角色。决定读取 impl/core/<role>_protocol.py、对应 ROLE.md 和比较脚本；
# 灰度加载使用 project.yaml 的 <role>_draft 配置。
role: "attribute"

# 本轮真正要改善什么。探索、修改和最终结论都围绕它进行。
objective: |
  Describe the behavior that should improve and the constraints that matter.

# 项目已有固定 mock 数据集。整个 loop 直接加载并使用同一份数据，不在迭代中修改。
mock_source: "<existing project mock dataset>"
mock_frozen: true

# 理解项目和寻找优化路径时应阅读的源码、配置、文档、trace 或已有工具。
material:
  - path: "impl/projects/<project>/project.yaml"
    note: "项目配置和运行边界。"
  - path: "impl/projects/<project>/<role>.py"
    note: "当前 production 实现。"
  - path: "impl/projects/<project>/adapter.py"
    note: "角色、工具和已有检查能力的入口。"

# 用户如何判断 objective 是否真正改善。结论必须结合真实实验逐条回答。
review: |
  泛化能力：未见 case 上也能保持目标行为。
  准确性：对目标行为的判断或归因正确。
  可用性：探索结果和修改能直接帮助解决目标问题。

# 探索循环上限。达到上限仍未改善就说明 blocker，不 promotion。
max_iterations: 5

# 可选的简洁结论输出路径。
report_path: "impl/projects/<project>/draft/<role>_comparison_report.md"
