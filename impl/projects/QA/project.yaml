schema_version: 1

project:
  id: QA
  name: QA 评估项目
  description: 评估已产出的问答输入、输出、参考答案或上下文证据，支持样本级 scenario。
  capabilities: [live_run, judge, attribute, cluster, check, scenario]
  resources:
    documents:
      application: application.md
      mock: mock.md
      evaluation: evaluation.md
      judge_boundary: judge_boundary.md
      attribution: attribution.md
      checklist: checklist.md
      implementation_standard: implementation_standard.md

runtime:
  mode: uploaded_output_evaluation
  interaction:
    mode: single_turn
  ready: [output, reference]

verifier:
  attribution:
    enabled: false
  presentation:
    scenarios: [qa_gold_answer, qa_context_faithfulness, qa_weak_quality]
    score_dimensions: [correctness, completeness, key_point_coverage, faithfulness, relevance, usefulness, coherence, risk_control, clarity]
    error_taxonomy: [answer_incorrect, answer_incomplete, question_misunderstood, irrelevant_answer, unsupported_claim, hallucination, context_not_used, insufficient_context, context_noise, over_refusal, format_error, too_vague, contradiction, needs_human_review, none]
    core_forbidden_markers: []
  extra:
    check_rules:
      description: QA 场景检查所需的字段约束
      value_type: mapping
      schema_version: 1
      consumers: [impl.core.check]
      value:
        require_scenario: true
        scenario_requirements:
          qa_gold_answer:
            reference_field: actual_answer
          qa_context_faithfulness:
            input_field: contexts
          qa_weak_quality:
            data_quality_flag: estimated_quality_only
  assets:
    - asset_id: judge_evaluation
      kind: context
      enabled: true
      roles: [judge]
      production_path: evaluation.md
    - asset_id: judge_boundary
      kind: context
      enabled: true
      roles: [judge]
      production_path: judge_boundary.md
    - asset_id: mock_contract
      kind: context
      enabled: true
      roles: [mock]
      production_path: mock.md
    - asset_id: mock_application
      kind: context
      enabled: true
      roles: [mock]
      production_path: application.md

metadata:
  initialized_from: ../../../projects/QA/project.yaml
  source_revision: null
