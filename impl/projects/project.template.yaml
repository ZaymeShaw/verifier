# Formal project runtime configuration template. Runtime never loads this file.
schema_version: 1

project:
  id: my_project
  name: 示例项目
  description: 简短说明这个项目测什么
  capabilities: [single_turn, judge, check]

runtime:
  # existing_service_required | existing_service_optional | uploaded_output_evaluation
  mode: uploaded_output_evaluation
  interaction:
    mode: single_turn
  ready: [output, reference]

verifier:
  # Every project must choose one boolean. Manual attribution is a run override.
  attribution:
    enabled: false

metadata:
  initialized_from: ../../../projects/my_project/project.yaml
  source_revision: null

