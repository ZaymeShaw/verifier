schema_version: 1

project:
  id: marketting-planning-intent
  name: 营销规划意图识别评估项目
  description: 单独评估营销规划业务服务的 intent-recognition 单轮接口，与 marketting-planning 共享业务服务但测评边界只覆盖意图识别。
  capabilities: [live_run, judge, attribute, cluster, check, scenario, single_turn, intent_recognition]
  resources:
    source:
      repository: ""
    documents:
      application: application.md
      mock: mock.md
      evaluation: evaluation.md
      judge_boundary: judge_boundary.md
      attribution: attribution.md
      checklist: checklist.md
      implementation_standard: implementation_standard.md
      intent: intent.md

runtime:
  mode: existing_service_optional
  interaction:
    mode: single_turn
  ready: [reference]
  services:
    primary:
      base_url: http://127.0.0.1:9006
      endpoint: /api/v1/marketing-planning/intent-recognition
      method: POST
      timeout_seconds: 60

verifier:
  attribution:
    enabled: true
  roles:
    attribute:
      draft:
        enabled: true
        module: draft/attribute.py
        reason: Batch attribution validation through the 8021 UAT frontend.
  presentation:
    scenarios: [intent_recognition, non_agent_intent, fallback_unknown]
    intent_labels: [other, customer_portrait, nbev_planning, nbev_planning_fallback, achievement_measurement_adjustment, team_portrait, target_value_adjustment]
    intent_descriptions:
      other: 其他意图 — 完全超出 NBEV 规划范畴
      customer_portrait: 客户画像分析
      nbev_planning: NBEV 达成路径规划分析
      nbev_planning_fallback: NBEV 规划兜底
      achievement_measurement_adjustment: 达成测算调整
      team_portrait: 队伍画像分析
      target_value_adjustment: NBEV 目标值调整
    error_taxonomy: [request_normalization, intent_recognition, label_mapping, confidence, adapter_extraction, external_dependency, needs_human_review, none]
    core_forbidden_markers: [marketing_planning, marketting-planning-intent, /api/v1/marketing-planning/intent-recognition]
  extra:
    check_rules:
      description: 意图识别 case 必须携带场景标识
      value_type: mapping
      schema_version: 1
      consumers: [impl.core.check]
      value:
        require_scenario: true
  assets:
    - asset_id: attribute_investigation
      kind: investigation
      enabled: true
      roles: [attribute]
      production_path: investigation/attribute
      candidate_path: draft/investigation/attribute
      replace: true
    - asset_id: attribute_investigation_tools
      kind: tool
      enabled: true
      roles: [attribute]
      production_path: tools/investigation_tools.py
      candidate_path: draft/tools/investigation_tools.py
      replace: true
    - asset_id: attribute_investigation_context_builder
      kind: context_builder
      enabled: true
      roles: [attribute]
      production_path: context_builders/attribute_investigation.py
      candidate_path: draft/context_builders/attribute_investigation.py
      replace: true
    - asset_id: judge_evaluation
      kind: context
      enabled: true
      roles: [judge]
      production_path: evaluation.md
    - asset_id: judge_boundary
      kind: context
      enabled: true
      roles: [judge]
      production_path: judge_boundary.md
    - asset_id: mock_contract
      kind: context
      enabled: true
      roles: [mock]
      production_path: mock.md
    - asset_id: mock_application
      kind: context
      enabled: true
      roles: [mock]
      production_path: application.md

environment:
  variables:
    MARKETTING_PLANNING_INTENT_REPO:
      bind: project.resources.source.repository
      type: path
      required: false
      secret: false
      description: 营销规划业务源码挂载位置（意图识别项目）
    MARKETTING_PLANNING_INTENT_BASE_URL:
      bind: runtime.services.primary.base_url
      type: url
      required: false
      secret: false
      description: 营销规划意图识别服务地址

metadata:
  initialized_from: ../../../projects/marketting-planning-intent/project.yaml
  source_revision: null
