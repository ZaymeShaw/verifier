schema_version: 1

project:
  id: marketting-planning-intent
  name: 营销规划意图识别评估项目
  description: 单独评估营销规划业务服务的 intent-recognition 单轮接口，与 marketting-planning 共享业务服务但测评边界只覆盖意图识别。
  capabilities: [live_run, judge, attribute, cluster, check, scenario, single_turn, intent_recognition]
  taxonomies:
    intent:
      labels: [other, customer_portrait, nbev_planning, nbev_planning_fallback, achievement_measurement_adjustment, team_portrait, target_value_adjustment]
      descriptions:
        other: 其他意图 — 完全超出 NBEV 规划范畴
        customer_portrait: 客户画像分析
        nbev_planning: NBEV 达成路径规划分析
        nbev_planning_fallback: NBEV 规划兜底
        achievement_measurement_adjustment: 达成测算调整
        team_portrait: 队伍画像分析
        target_value_adjustment: NBEV 目标值调整
  resources:
    source:
      repository: ""
    documents:
      application: project://application.md
      mock: project://mock.md
      evaluation: project://evaluation.md
      judge_boundary: project://judge_boundary.md
      attribution: project://attribution.md
      checklist: project://checklist.md
      implementation_standard: project://implementation_standard.md
      intent: project://intent.md

runtime:
  mode: existing_service_optional
  application:
    interface:
      shape: single-turn marketing intent-recognition POST request and normalized intent label/confidence output
      source: source_demand, source_start, application.md, and adapter.py
    start_run: existing optional shared marketing-planning service at api.base_url
    boundary: only intent recognition is evaluated; multi-turn planning and SSE card generation are out of scope
  interaction:
    mode: single_turn
  ready: [reference]
  adapter:
    request_construction:
      builder: Adapter.build_request normalizes query/user_text, scenario, expected_intent, and reference
      required_inputs: [query]
    output_extraction:
      extractor: Adapter.extract_output normalizes recognized intent, confidence, raw label, and errors
      normalized_output: intent, confidence, raw_intent, errors
    reference_handling:
      source_priority: [input_reference, expected_intent, judge_generated, missing]
      alignment: reference intent label is aligned to the normalized intent field
  batch_persistence:
    case_shape: id, selected, input, output, reference, metadata, scenario, source, status, error
    transient_results: do not persist full trace, judge, attribute, raw response, or frontend_view as durable case-pool source data
  mock_cases:
    source: fixture
    default_scenarios: [intent_recognition, non_agent_intent, fallback_unknown]
  services:
    primary:
      base_url: http://127.0.0.1:9006
      endpoint: /api/v1/marketing-planning/intent-recognition
      method: POST
      timeout_seconds: 60

verifier:
  attribution:
    enabled: true
    trace:
      document: attribution.md
      trace_nodes: [request_normalization, intent_api_call, adapter_extraction, label_mapping, judge, attribution]
  scenarios:
    allowed: [intent_recognition, non_agent_intent, fallback_unknown]
  judge:
    boundary:
      document: judge_boundary.md
      gate: boundary limits fulfillment assessment to single-turn intent label correctness and excludes planning result generation
  roles:
    attribute:
      tool_call_limit: 4
      draft:
        enabled: true
        module: project://draft/attribute.py
        tool_call_limit: 7
        reason: Batch attribution validation through the 8021 UAT frontend.
  presentation:
    error_taxonomy: [request_normalization, intent_recognition, label_mapping, confidence, adapter_extraction, external_dependency, needs_human_review, none]
    frontend_view:
      live: render query, normalized intent output, reference intent, Judge, Attribute, and compact raw response drill-down
      summary: render intent case pool with Output and Reference as aligned label/confidence JSON
  check_rules:
    require_scenario: true
    core_forbidden_markers: [marketing_planning, marketting-planning-intent, /api/v1/marketing-planning/intent-recognition]
    evidence:
      documents: [application.md, mock.md, evaluation.md, judge_boundary.md, attribution.md, checklist.md]
      tests: [tests.test_demand_check_gap]
  assets:
    - asset_id: attribute_investigation
      kind: investigation
      enabled: true
      roles: [attribute]
      production_path: project://investigation/attribute
      candidate_path: project://draft/investigation/attribute
      replace: true
    - asset_id: attribute_investigation_tools
      kind: tool
      enabled: true
      roles: [attribute]
      production_path: project://tools/investigation_tools.py
      candidate_path: project://draft/tools/investigation_tools.py
      replace: true
    - asset_id: attribute_investigation_context_builder
      kind: context_builder
      enabled: true
      roles: [attribute]
      production_path: project://context_builders/attribute_investigation.py
      candidate_path: project://draft/context_builders/attribute_investigation.py
      replace: true
    - asset_id: judge_evaluation
      kind: context
      enabled: true
      roles: [judge]
      production_path: project://evaluation.md
    - asset_id: judge_boundary
      kind: context
      enabled: true
      roles: [judge]
      production_path: project://judge_boundary.md
    - asset_id: mock_contract
      kind: context
      enabled: true
      roles: [mock]
      production_path: project://mock.md
    - asset_id: mock_application
      kind: context
      enabled: true
      roles: [mock]
      production_path: project://application.md

environment:
  variables:
    MARKETTING_PLANNING_INTENT_REPO:
      bind: project.resources.source.repository
      type: path
      required: true
      secret: false
      description: 营销规划业务源码挂载位置（意图识别项目）
    MARKETTING_PLANNING_INTENT_BASE_URL:
      bind: runtime.services.primary.base_url
      type: url
      required: false
      secret: false
      description: 营销规划意图识别服务地址

metadata:
  initialized_from: route://project.yaml
  source_revision: null
