schema_version: 1

project:
  id: client_search
  name: 客户搜索评估示例
  description: 将客户搜索项目作为通用评估系统的第一个项目适配实现。
  capabilities: [live_run, judge, attribute, cluster, check]
  resources:
    source:
      repository: ""
      paths:
        field_definitions: src/main/python/config/field_definitions_args.yaml
        field_enums: src/main/python/config/field_enums_args.yaml
        value_mappings: src/main/python/config/value_mappings_args.yaml
        enhanced_rules: src/main/python/config/enhanced_rules_args.yaml
    documents:
      application: application.md
      mock: mock.md
      evaluation: evaluation.md
      judge_boundary: judge_boundary_protocals.md
      judge_standard: judge.md
      attribution: attribution.md
      checklist: checklist.md
      implementation_standard: implementation_standard.md

runtime:
  mode: existing_service_required
  interaction:
    mode: single_turn
  ready: []
  services:
    primary:
      base_url: http://127.0.0.1:8000
      endpoint: /api/v1/client_search_query_parse_no_encipher
      method: POST
      timeout_seconds: 60
    dependencies:
      downstream_search:
        enabled: true
        base_url: http://127.0.0.1:8081
        endpoint: /api/v1/search/customer
        method: POST
        timeout_seconds: 3

verifier:
  attribution:
    enabled: true
  field_provider:
    module: field_provider.py
    class: ClientSearchFieldDefinitionProvider
  endpoint_discovery:
    enabled: true
    framework: fastapi
    source_roots: [src/main/python]
    route_prefix: /api/v1
    scan_patterns: ["*.py"]
    exclude_patterns: ["*/test/*", "*/migrations/*", "*/venv/*", "*/__pycache__/*", "*/logs/*", "*/docs/*", "*/docs_BAK/*"]
    blacklist:
      methods: [PUT, DELETE, PATCH]
      route_keywords: [reload, reindex, delete, update, create, write]
  roles:
    attribute:
      draft:
        enabled: true
        module: draft/attribute.py
        reason: Batch attribution validation through the 8021 UAT frontend.
  presentation:
    core_forbidden_markers: [query_logic, conditions, matched_level, intent_summary, clientAge, annPremSegNum, clientSex]
  extra:
    semantic_equivalence_rules:
      description: 客户搜索条件在 judge 中允许采用的业务语义等价规则
      value_type: mapping
      schema_version: 1
      consumers: [impl.projects.client_search.judge, impl.projects.client_search.tools.search_condition_compare]
      value:
        equivalent_condition_forms:
          - field: pCategorys
            operator: MATCH
            value: 疾病保险
            equivalent_operator: CONTAINS
            equivalent_value: [疾病保险]
            basis: pCategorys 是列表型产品类别字段，单值 MATCH 与单元素 CONTAINS 等价
          - field: pCategorys
            operator: CONTAINS
            value: [年金保险]
            equivalent_operator: CONTAINS
            equivalent_value: [年金保险]
            basis: 字段枚举包含年金保险
          - field: pCategorys
            operator: CONTAINS
            value: [两全保险]
            equivalent_operator: CONTAINS
            equivalent_value: [两全保险]
            basis: 字段枚举包含两全保险
        operator_compatibility:
          - field: clientTemperature
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
          - field: education
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
          - field: jujiaClientGrade
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
          - field: kangyangClientGrade
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
          - field: pTypes
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
          - field: polNoInfo.plancodeinfo.abbrname
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
          - field: searchClientName
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: name single-value equivalence
          - field: zxjyEquityGrade
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
        equivalent_fields:
          - field: familyInfo.familyclientage
            equivalent_field: familyInfo.familyclientbirthday
            condition: birthday date range is equivalent to the family member age boundary under the current date
            basis: age-to-birthday executable conversion
  assets:
    - asset_id: attribute_investigation
      kind: investigation
      enabled: true
      roles: [attribute]
      production_path: investigation/attribute
      candidate_path: draft/investigation/attribute
      replace: true
    - asset_id: attribute_investigation_tools
      kind: tool
      enabled: true
      roles: [attribute]
      production_path: tools/investigation_tools.py
      candidate_path: draft/tools/investigation_tools.py
      replace: true
    - asset_id: attribute_investigation_context_builder
      kind: context_builder
      enabled: true
      roles: [attribute]
      production_path: context_builders/attribute_investigation.py
      candidate_path: draft/context_builders/attribute_investigation.py
      replace: true
    - asset_id: judge_evaluation
      kind: context
      enabled: true
      roles: [judge]
      production_path: evaluation.md
    - asset_id: judge_boundary
      kind: context
      enabled: true
      roles: [judge]
      production_path: judge_boundary_protocals.md
    - asset_id: judge_standard
      kind: context
      enabled: true
      roles: [judge]
      production_path: judge.md
    - asset_id: mock_contract
      kind: context
      enabled: true
      roles: [mock]
      production_path: mock.md
    - asset_id: mock_application
      kind: context
      enabled: true
      roles: [mock]
      production_path: application.md

environment:
  variables:
    CLIENT_SEARCH_REPO:
      bind: project.resources.source.repository
      type: path
      required: false
      secret: false
      description: 客户搜索业务源码挂载位置
    CLIENT_SEARCH_BASE_URL:
      bind: runtime.services.primary.base_url
      type: url
      required: false
      secret: false
      description: 客户搜索解析服务地址
    CLIENT_SEARCH_DOWNSTREAM_BASE_URL:
      bind: runtime.services.dependencies.downstream_search.base_url
      type: url
      required: false
      secret: false
      description: 下游客户搜索服务地址

metadata:
  initialized_from: ../../../projects/client_search/project.yaml
  source_revision: null
