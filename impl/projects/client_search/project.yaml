schema_version: 1

project:
  id: client_search
  name: 客户搜索评估示例
  description: 将客户搜索项目作为通用评估系统的第一个项目适配实现。
  capabilities: [live_run, judge, attribute, cluster, check]
  resources:
    source:
      repository: ""
      paths:
        field_definitions: business://src/main/python/config/field_definitions_args.yaml
        field_enums: business://src/main/python/config/field_enums_args.yaml
        value_mappings: business://src/main/python/config/value_mappings_args.yaml
        enhanced_rules: business://src/main/python/config/enhanced_rules_args.yaml
    documents:
      application: project://application.md
      mock: project://mock.md
      evaluation: project://evaluation.md
      judge_boundary: project://judge_boundary_protocals.md
      judge_standard: project://judge.md
      attribution: project://attribution.md
      checklist: project://checklist.md
      implementation_standard: project://implementation_standard.md

runtime:
  mode: existing_service_required
  application:
    interface:
      shape: client search query parse POST request and normalized query/filter output
      source: source_readme, source_config, source_prompt, and adapter.py
    start_run: existing parser service at api.base_url with optional downstream customer search probe
    boundary: parser output is in scope; downstream result-set verification follows application.downstream_search availability
  interaction:
    mode: single_turn
  ready: []
  adapter:
    request_construction:
      builder: Adapter.build_request converts query/user intent fields into parser request body
      required_inputs: [query]
    output_extraction:
      extractor: Adapter.extract_output normalizes parser response into query logic, conditions, routing, and downstream evidence
      normalized_output: search intent and executable customer-search condition semantics
    reference_handling:
      source_priority: [input_reference, expected_intent, judge_generated, missing]
      alignment: reference conditions are compared by business/search semantics rather than raw field surface only
  batch_persistence:
    case_shape: id, selected, input, output, reference, metadata, scenario, source, status, error
    transient_results: do not persist full trace, judge, attribute, downstream payload, or frontend_view as durable case-pool source data
  mock_cases:
    source: fixture
    default_scenarios: [single_condition, multi_condition_and, product_category_or, product_exclusion, age_boundary, premium_unit_conversion, policy_status_filter, unsupported_family_phrase]
  services:
    primary:
      base_url: http://127.0.0.1:8000
      endpoint: /api/v1/client_search_query_parse_no_encipher
      method: POST
      timeout_seconds: 60
    dependencies:
      downstream_search:
        enabled: true
        base_url: http://127.0.0.1:8081
        endpoint: /api/v1/search/customer
        method: POST
        timeout_seconds: 3

verifier:
  attribution:
    enabled: true
    trace:
      document: attribution.md
      trace_nodes: [request_normalization, prompt_config_mapping, parser_call, adapter_extraction, downstream_search_probe, judge, attribution]
  scenarios:
    allowed: [single_condition, multi_condition_and, product_category_or, product_exclusion, age_boundary, premium_unit_conversion, policy_status_filter, unsupported_family_phrase]
  judge:
    boundary:
      document: judge_boundary_protocals.md
      gate: application_boundary determines parser/downstream judge_scope before fulfillment reconciliation
  presentation:
    frontend_view:
      live: render normalized parser output and raw project fields under protocol extension panels
      summary: align Output and Reference as formatted JSON with equal-size table cells and compact drill-downs
  field_provider:
    module: project://field_provider.py
    class: ClientSearchFieldDefinitionProvider
  endpoint_discovery:
    enabled: true
    framework: fastapi
    source_roots: [business://src/main/python]
    route_prefix: /api/v1
    scan_patterns: ["*.py"]
    exclude_patterns: ["*/test/*", "*/migrations/*", "*/venv/*", "*/__pycache__/*", "*/logs/*", "*/docs/*", "*/docs_BAK/*"]
    blacklist:
      methods: [PUT, DELETE, PATCH]
      route_keywords: [reload, reindex, delete, update, create, write]
  roles:
    attribute:
      tool_call_limit: 8
      draft:
        enabled: true
        module: project://draft/attribute.py
        tool_call_limit: 8
        reason: Batch attribution validation through the 8021 UAT frontend.
  check_rules:
    core_forbidden_markers: [matched_level, clientAge, annPremSegNum, clientSex]
    evidence:
      documents: [application.md, mock.md, evaluation.md, judge_boundary_protocals.md, judge.md, attribution.md, checklist.md]
      tests: [tests.test_demand_check_gap]
  extra:
    semantic_equivalence_rules:
      description: 客户搜索条件在 judge 中允许采用的业务语义等价规则
      value_type: mapping
      schema_version: 1
      consumers: [impl.projects.client_search.judge, impl.projects.client_search.tools.search_condition_compare]
      value:
        equivalent_condition_forms:
          - field: pCategorys
            operator: MATCH
            value: 疾病保险
            equivalent_operator: CONTAINS
            equivalent_value: [疾病保险]
            basis: pCategorys 是列表型产品类别字段，单值 MATCH 与单元素 CONTAINS 等价
          - field: pCategorys
            operator: CONTAINS
            value: [年金保险]
            equivalent_operator: CONTAINS
            equivalent_value: [年金保险]
            basis: 字段枚举包含年金保险
          - field: pCategorys
            operator: CONTAINS
            value: [两全保险]
            equivalent_operator: CONTAINS
            equivalent_value: [两全保险]
            basis: 字段枚举包含两全保险
        operator_compatibility:
          - field: clientTemperature
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
          - field: education
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
          - field: jujiaClientGrade
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
          - field: kangyangClientGrade
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
          - field: pTypes
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
          - field: polNoInfo.plancodeinfo.abbrname
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
          - field: searchClientName
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: name single-value equivalence
          - field: zxjyEquityGrade
            operator: MATCH
            equivalent_operator: CONTAINS
            condition: same field and exactly one identical enum/list value
            basis: enum single-value equivalence
        equivalent_fields:
          - field: familyInfo.familyclientage
            equivalent_field: familyInfo.familyclientbirthday
            condition: birthday date range is equivalent to the family member age boundary under the current date
            basis: age-to-birthday executable conversion
  assets:
    - asset_id: attribute_investigation
      kind: investigation
      enabled: true
      roles: [attribute]
      production_path: project://investigation/attribute
      candidate_path: project://draft/investigation/attribute
      replace: true
    - asset_id: attribute_investigation_tools
      kind: tool
      enabled: true
      roles: [attribute]
      production_path: project://tools/investigation_tools.py
      candidate_path: project://draft/tools/investigation_tools.py
      replace: true
    - asset_id: attribute_investigation_context_builder
      kind: context_builder
      enabled: true
      roles: [attribute]
      production_path: project://context_builders/attribute_investigation.py
      candidate_path: project://draft/context_builders/attribute_investigation.py
      replace: true
    - asset_id: judge_evaluation
      kind: context
      enabled: true
      roles: [judge]
      production_path: project://evaluation.md
    - asset_id: judge_boundary
      kind: context
      enabled: true
      roles: [judge]
      production_path: project://judge_boundary_protocals.md
    - asset_id: judge_standard
      kind: context
      enabled: true
      roles: [judge]
      production_path: project://judge.md
    - asset_id: mock_contract
      kind: context
      enabled: true
      roles: [mock]
      production_path: project://mock.md
    - asset_id: mock_application
      kind: context
      enabled: true
      roles: [mock]
      production_path: project://application.md

environment:
  variables:
    CLIENT_SEARCH_REPO:
      bind: project.resources.source.repository
      type: path
      required: true
      secret: false
      description: 客户搜索业务源码挂载位置
    CLIENT_SEARCH_BASE_URL:
      bind: runtime.services.primary.base_url
      type: url
      required: false
      secret: false
      description: 客户搜索解析服务地址
    CLIENT_SEARCH_DOWNSTREAM_BASE_URL:
      bind: runtime.services.dependencies.downstream_search.base_url
      type: url
      required: false
      secret: false
      description: 下游客户搜索服务地址

metadata:
  initialized_from: route://project.yaml
  source_revision: null
