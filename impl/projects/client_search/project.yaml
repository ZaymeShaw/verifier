    operator_compatibility:
      - field: "clientTemperature"
        operator: "MATCH"
        equivalent_operator: "CONTAINS"
        condition: "same field and exactly one identical enum/list value"
        basis: "enum field where single-value MATCH is equivalent to CONTAINS with one-element list"
