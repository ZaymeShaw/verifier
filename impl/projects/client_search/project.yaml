# ---- API endpoint 自动发现（spec/apitool_discover.md） ----
# 通用引擎扫描业务系统源码中的路由装饰器，自动构建为 VerifiableTool。
# 不配置此字段则跳过扫描，完全兼容现有项目。
endpoint_discovery:
  source_roots:
    - /Users/xiaozijian/WorkSpace/projects/claude_code/llm_client_search_0513/llm_client_search/src/main/python
  framework: fastapi
  route_prefix: /api/v1
  scan_patterns: ["*.py"]
  exclude_patterns:
    - "*/test/*"
    - "*/migrations/*"
    - "*/venv/*"
    - "*/__pycache__/*"
    - "*/logs/*"
    - "*/docs/*"
    - "*/docs_BAK/*"
  # 黑名单：命中则在发现阶段排除，不落盘、不暴露给 LLM
  blacklist:
    methods: ["PUT", "DELETE", "PATCH"]
    route_keywords: ["reload", "reindex", "delete", "update", "create", "write"]

