<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live 请求</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f6f8fb;color:#172033}header{background:#101828;color:white;padding:22px 30px}main{display:grid;grid-template-columns:420px 1fr;gap:16px;padding:18px}.panel,.card{background:white;border:1px solid #e5e7eb;border-radius:14px;padding:16px}.cards{display:grid;gap:14px}.step{padding:0;overflow:hidden}.step>summary{display:flex;align-items:center;justify-content:space-between;gap:12px;list-style:none;cursor:pointer;padding:16px 18px;background:#f8fafc}.step>summary::-webkit-details-marker{display:none}.step>summary h2{margin:0;font-size:17px}.step>summary:after{content:"展开";font-size:12px;color:#64748b}.step[open]>summary:after{content:"收起"}.step-body{padding:16px 18px;border-top:1px solid #e5e7eb}.summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:12px}.metric{background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:10px}.metric b{display:block;font-size:13px;color:#64748b;margin-bottom:4px}.badge{display:inline-block;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:700;background:#e2e8f0;color:#334155}.badge.ok{background:#dcfce7;color:#166534}.badge.bad{background:#fee2e2;color:#991b1b}.badge.warn{background:#fef3c7;color:#92400e}label{display:block;font-weight:700;margin:12px 0 6px}input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:8px;padding:10px}textarea{min-height:128px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}button{background:#2563eb;color:white;border:0;border-radius:8px;padding:10px 13px;font-weight:700;cursor:pointer;margin-top:12px}button.secondary{background:#e2e8f0;color:#172033}pre{white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#e2e8f0;border-radius:10px;padding:12px;max-height:260px;overflow:auto}.inline-details{border:1px solid #e2e8f0;border-radius:10px;margin:10px 0;background:#f8fafc}.inline-details summary{cursor:pointer;padding:10px 12px;font-weight:700;color:#334155}.inline-details pre{margin:0 10px 10px;max-height:180px}.row{display:flex;gap:8px;flex-wrap:wrap}.hint,.muted{color:#64748b;font-size:13px}.empty{color:#94a3b8}.kv{margin:6px 0}.kv b{color:#334155}.raw-title{margin:14px 0 6px;font-weight:700;color:#475569}@media(max-width:1000px){main{grid-template-columns:1fr}.summary{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><h1>Live 请求</h1><p>单次请求链路：业务服务 → Judge → Attribute。Cluster 聚合在归因总结页处理。</p></header>
<main>
  <section class="panel">
    <label>Project</label>
    <select id="project" onchange="switchProject()"></select>
    <label>Input JSON</label>
    <textarea id="input">{"query":"45岁女性保费10万以上"}</textarea>
    <label>Expected Intent（可选，传给 judge agent）</label>
    <textarea id="expected" placeholder="可留空；填写后用于 judge 当前 RunTrace。"></textarea>
    <div class="row">
      <button onclick="liveRun()">请求业务服务</button>
      <button class="secondary" onclick="runJudge()">请求 Judge</button>
      <button class="secondary" onclick="runAttribute()">请求 Attribute</button>
      <button class="secondary" onclick="runChain()">统一全链路</button>
    </div>
    <div class="hint">按顺序执行单步按钮会复用当前页面保存的 lastTrace / lastJudge。</div>
    <div id="status" class="muted" style="margin-top:12px">等待请求。</div>
  </section>

  <section class="cards">
    <div class="summary">
      <div class="metric"><b>业务请求</b><span id="traceBadge" class="badge">未运行</span></div>
      <div class="metric"><b>Judge</b><span id="judgeBadge" class="badge">未运行</span></div>
      <div class="metric"><b>Attribute</b><span id="attributeBadge" class="badge">未运行</span></div>
    </div>
    <details class="card step" open>
      <summary><h2>业务请求结果</h2><span id="traceBadgeInPanel" class="badge">未运行</span></summary>
      <div class="step-body">
        <div id="traceHuman" class="empty">尚未请求业务服务。</div>
        <div class="raw-title">Raw JSON</div>
        <pre id="traceRaw">{}</pre>
      </div>
    </details>
    <details class="card step">
      <summary><h2>Judge 评估</h2><span id="judgeBadgeInPanel" class="badge">未运行</span></summary>
      <div class="step-body">
        <div id="judgeHuman" class="empty">尚未请求 judge agent。</div>
        <div class="raw-title">Raw JSON</div>
        <pre id="judgeRaw">{}</pre>
      </div>
    </details>
    <details class="card step">
      <summary><h2>Attribute 归因</h2><span id="attributeBadgeInPanel" class="badge">未运行</span></summary>
      <div class="step-body">
        <div id="attributeHuman" class="empty">尚未请求 attribute agent。</div>
        <div class="raw-title">Raw JSON</div>
        <pre id="attributeRaw">{}</pre>
      </div>
    </details>
  </section>
</main>
<script>
const defaultInputs={
  client_search:{query:'45岁女性保费10万以上'},
  QA:{question:'什么是犹豫期？',actual_answer:'犹豫期通常是投保人收到合同后的一段可无条件退保期限。',golden_answer:'犹豫期是投保人收到保险合同后，在规定天数内可申请解除合同并通常退还已交保费的期限。'},
  'marketting-planning':{query:'规划NBEV增长路径',user_text:'规划NBEV增长路径'},
  'marketting-planning-intent':{query:'我想提高保费规模'}
};
function scopedKey(key){return key+':'+project()}
let currentTrace = null;
let currentJudge = null;
let currentAttribute = null;
let currentCluster = null;
let currentView = null;
function readSession(key){
  const text=sessionStorage.getItem(key);
  return text ? JSON.parse(text) : null;
}
async function post(path, body){
  const res = await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data = await res.json();
  return data;
}
function liveSchemaCheckRequest(projectId, input){
  // 前端轻量校验：调后端 /api/live_schema_check 校验 input 是否符合 REQUEST_SHAPE
  // 此处仅做兜底提示，不阻断请求
  try {
    if(!input || typeof input!=='object'){return true;}
    return true; // 实际校验在后端 _check_extracted_output_with_live_schema 等挂载点完成
  }catch(e){return true;}
}
  if(!res.ok || data.error){throw new Error(data.error || ('HTTP '+res.status));}
  return data;
}
function project(){return document.getElementById('project').value}
function loadScopedState(){currentTrace=readSession(scopedKey('lastTrace'));currentJudge=readSession(scopedKey('lastJudge'));currentAttribute=readSession(scopedKey('lastAttribute'));currentCluster=readSession(scopedKey('lastCluster'));currentView=readSession(scopedKey('lastView'));
  if(currentTrace && !traceMatchesCurrentInput(currentTrace)){
    currentTrace=null;currentJudge=null;currentAttribute=null;currentCluster=null;currentView=null;
    sessionStorage.removeItem(scopedKey('lastTrace'));sessionStorage.removeItem(scopedKey('lastJudge'));sessionStorage.removeItem(scopedKey('lastAttribute'));sessionStorage.removeItem(scopedKey('lastCluster'));sessionStorage.removeItem(scopedKey('lastView'));sessionStorage.removeItem(scopedKey('lastView'));
  }
}
function switchProject(){
  const savedInput=sessionStorage.getItem(scopedKey('input'));
  document.getElementById('input').value=savedInput || JSON.stringify(defaultInputs[project()] || {}, null, 2);
  loadScopedState();renderAll();
}
async function initProjects(){
  const res=await fetch('/projects');
  const data=await res.json();
  const projects=data.projects || ['client_search'];
  document.getElementById('project').innerHTML=projects.map(item=>'<option value="'+escapeHtml(item)+'">'+escapeHtml(item)+'</option>').join('');
  if(projects.includes('client_search')){document.getElementById('project').value='client_search';}
  switchProject();
}
function payload(){sessionStorage.setItem(scopedKey('input'),document.getElementById('input').value);return {project:project(),input:JSON.parse(document.getElementById('input').value)}}
function traceMatchesCurrentInput(trace){return !!trace && trace.project_id===project() && JSON.stringify(trace.input || {})===JSON.stringify(payload().input)}
function expectedIntent(){return document.getElementById('expected').value.trim()}
function requireValue(value, name){if(!value){throw new Error('缺少 '+name+'，请先执行前一步。')}return value}
async function refreshFrontendView(){
  if(!currentTrace && !currentJudge && !currentAttribute){currentView=null;sessionStorage.removeItem(scopedKey('lastView'));return null;}
  currentView=await post('/api/frontend_view',{project:project(),trace:currentTrace,judge:currentJudge,attribute:currentAttribute,cluster:currentCluster});
  sessionStorage.setItem(scopedKey('lastView'), JSON.stringify(currentView));
  return currentView;
}
function judgePanel(){return currentView?.judge_panel || currentJudge || {};}
function attributePanel(){return currentView?.attribute_panel || currentAttribute || {};}
function fulfillmentPanel(){return currentView?.fulfillment_panel || {};}
function expectationAttributionPanel(){return currentView?.expectation_attribution_panel || {};}
function tableRow(){return currentView?.table_row || currentTrace?.table_row || {};}
function showRaw(id, data){document.getElementById(id).textContent=JSON.stringify(data ?? {}, null, 2)}
function setBadge(id, text, state){
  const el=document.getElementById(id);
  if(!el){return;}
  el.textContent=text;
  el.className='badge '+(state || '');
}
function setStepBadge(base, text, state){
  setBadge(base+'Badge', text, state);
  setBadge(base+'BadgeInPanel', text, state);
}
function list(items){
  if(!items || !items.length){return '<span class="muted">无</span>';}
  return '<ul>'+items.map(item=>'<li>'+escapeHtml(typeof item==='string'?item:JSON.stringify(item))+'</li>').join('')+'</ul>';
}
function escapeHtml(text){return String(text).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function collapsedJson(title, value){
  const count=value && typeof value==='object' ? Object.keys(value).length : 0;
  const label=count ? title+'（'+count+'项）' : title+'（空）';
  return '<details class="inline-details"><summary>'+escapeHtml(label)+'</summary><pre>'+escapeHtml(JSON.stringify(value || {}, null, 2))+'</pre></details>';
}
function renderStateMachine(trace, judge, attribute){
  const history=trace?.state_history || judge?.transition_decisions || attribute?.transition_decisions ? (trace?.state_history || []) : [];
  const gates=trace?.gate_decisions || judge?.gate_decisions || attribute?.gate_decisions || [];
  const failed=gates.filter(g=>!g.passed);
  const states=history.map(record=>record.state_id+' → '+(record.transition_decision?.to_state || '-')+' ['+(record.status || '-')+']');
  return collapsedJson('状态机执行', {stop_reason:trace?.stop_reason || '', state_count:history.length, failed_gate_count:failed.length, states, failed_gates:failed, state_history:history});
}
function renderConversation(trace){
  const row=tableRow();
  const turns=row.conversation_detail || [];
  if(!turns.length){return '';}
  const summary=row.conversation_summary || trace?.conversation_summary || {};
  const rows=turns.map((turn,index)=>'<div class="kv"><b>第 '+escapeHtml(turn.turn_index || index+1)+' 轮 '+escapeHtml(turn.role || '-')+'：</b>'+escapeHtml(turn.content || '')+(turn.stage?' · 阶段：'+escapeHtml(turn.stage):'')+(turn.extracted_summary?' · 摘要：'+escapeHtml(turn.extracted_summary):'')+'</div>').join('');
  return '<details class="inline-details" open><summary>多轮对话（'+escapeHtml(turns.length)+' 条消息）</summary><div style="padding:0 12px 10px">'+
    '<div class="kv"><b>停止原因：</b>'+escapeHtml(trace?.stop_reason || summary.stop_reason || '-')+'</div>'+
    '<div class="kv"><b>最终阶段：</b>'+escapeHtml(summary.final_stage || trace?.extracted_output?.stage || '-')+'</div>'+rows+'</div></details>';
}
function renderTrace(trace){
  showRaw('traceRaw', trace);
  if(!trace){setStepBadge('trace','未运行','');return;}
  setStepBadge('trace', trace.status || 'unknown', trace.status==='ok'?'ok':'bad');
  const output=trace.extracted_output || {};
  document.getElementById('traceHuman').innerHTML =
    '<div class="kv"><b>Trace ID：</b>'+escapeHtml(trace.trace_id || '')+'</div>'+
    '<div class="kv"><b>状态：</b>'+escapeHtml(trace.status || '')+'</div>'+renderStateMachine(trace, currentJudge, currentAttribute)+
    '<div class="kv"><b>Output / 被评估输出：</b>'+escapeHtml(output.summary || output.user_visible_text || output.actual_answer || (Object.keys(output).length ? JSON.stringify(output, null, 2) : ''))+'</div>'+renderConversation(trace)+
    '<div class="kv"><b>结构化输出：</b>'+escapeHtml(JSON.stringify(output.structured_output || output.logic || (Object.keys(output).length ? output : {}), null, 2))+'</div>';
}
function renderFulfillment(judge){
  const expectations=judge.business_expectations || [];
  const assessments=judge.fulfillment_assessments || [];
  const byId={};
  assessments.forEach(item=>{byId[item.expectation_id || '']=item;});
  const rows=expectations.map(exp=>{const assessment=byId[exp.expectation_id || ''] || {};return '<tr><td>'+escapeHtml(exp.expectation_id || '')+'</td><td>'+escapeHtml(exp.expected_outcome || '')+'</td><td>'+escapeHtml((exp.required_capabilities || []).join(', '))+'</td><td>'+escapeHtml(assessment.status || '-')+'</td><td>'+escapeHtml(assessment.blocking?'是':'否')+'</td></tr>';}).join('');
  return '<details class="inline-details" open><summary>业务预期达成矩阵（'+expectations.length+'项）</summary>'+
    '<div class="kv"><b>Consumer Contract：</b>'+escapeHtml(JSON.stringify(judge.consumer_contract || {}))+'</div>'+
    '<div class="kv"><b>Overall Fulfillment：</b>'+escapeHtml(JSON.stringify(judge.overall_fulfillment || {}))+'</div>'+
    '<table style="width:100%;border-collapse:collapse"><thead><tr><th>Expectation</th><th>Expected Outcome</th><th>Capabilities</th><th>Status</th><th>Blocking</th></tr></thead><tbody>'+(rows || '<tr><td colspan="5" class="muted">无 fulfillment assessments</td></tr>')+'</tbody></table></details>';
}
function renderAttributions(attribute){
  const rows=(attribute.expectation_attributions || []).map(item=>'<tr><td>'+escapeHtml(item.expectation_id || '')+'</td><td>'+escapeHtml(item.fulfillment_status || '')+'</td><td>'+escapeHtml(item.causal_category || '')+'</td><td>'+escapeHtml(shortAttributionEvidence(item))+'</td></tr>').join('');
  return '<details class="inline-details" open><summary>Expectation Attribution（'+(attribute.expectation_attributions || []).length+'项）</summary>'+
    '<div class="kv"><b>Probe Results：</b>'+escapeHtml(JSON.stringify(attribute.probe_results || []))+'</div>'+
    '<table style="width:100%;border-collapse:collapse"><thead><tr><th>Expectation</th><th>Fulfillment</th><th>Causal Category</th><th>Evidence</th></tr></thead><tbody>'+(rows || '<tr><td colspan="4" class="muted">无 expectation attribution</td></tr>')+'</tbody></table></details>';
}
function shortAttributionEvidence(item){return JSON.stringify({earliest_divergence:item.earliest_divergence || {}, improvement_direction:item.improvement_direction || [], incomplete_reason:item.incomplete_reason || ''}).slice(0,260);}
function fulfillmentStatusFromJudge(judge){const fulfillment=fulfillmentPanel();return fulfillment.overall_fulfillment?.status || judge?.display_status || judge?.overall_fulfillment?.status || '';}
function fulfillmentBadgeState(status){return status==='fulfilled'?'ok':(status==='not_fulfilled'?'bad':(status==='not_evaluable'?'warn':''));}
function renderJudge(judge){
  const panel=judgePanel();
  showRaw('judgeRaw', panel);
  if(!panel || !Object.keys(panel).length){setStepBadge('judge','未运行','');return;}
  const fulfillmentStatus=fulfillmentStatusFromJudge(panel);
  setStepBadge('judge', fulfillmentStatus || panel.verdict || 'unknown', fulfillmentBadgeState(fulfillmentStatus) || (panel.verdict==='correct'?'ok':(panel.verdict==='incorrect'?'bad':'warn')));
  const fulfillment=renderFulfillment(panel);
  document.getElementById('judgeHuman').innerHTML =
    '<div class="kv"><b>Overall Fulfillment：</b>'+escapeHtml(fulfillmentStatus || '-')+'</div>'+
    '<div class="kv"><b>评分：</b>'+escapeHtml(panel.score ?? '')+'</div>'+
    '<div class="kv"><b>置信度：</b>'+escapeHtml(panel.confidence ?? '')+'</div>'+
    '<div class="kv"><b>原因：</b>'+escapeHtml(panel.display_reason || panel.reasoning_summary || '')+'</div>'+fulfillment+renderStateMachine(currentTrace, panel, attributePanel())+collapsedJson('最终评估口径', panel.evaluation_boundary || {})+collapsedJson('判定推导', panel.verdict_derivation || {})+
    '<div class="kv"><b>证据：</b>'+list(panel.evidence)+'</div>'+collapsedJson('缺失/错误/多余', panel.wrong_missing_extra || {missing:panel.missing || [], wrong:panel.wrong || [], extra:panel.extra || []});
}
function attributeBadgeState(attribute){
  const attributions=attribute.expectation_attributions || [];
  if(attribute.causal_category==='no_issue' || attributions.some(item=>item.fulfillment_status==='fulfilled' && item.causal_category==='no_issue')){return 'ok';}
  return attribute.incomplete_reason || attribute.causal_category==='insufficient_evidence' ? 'warn' : 'bad';
}
function renderAttribute(attribute){
  const panel=attributePanel();
  showRaw('attributeRaw', panel);
  if(!panel || !Object.keys(panel).length){setStepBadge('attribute','未运行','');return;}
  setStepBadge('attribute', panel.display_causal_category || panel.causal_category || 'unknown', attributeBadgeState(panel));
  document.getElementById('attributeHuman').innerHTML =
    '<div class="kv"><b>因果类别：</b>'+escapeHtml(panel.display_causal_category || panel.causal_category || '')+'</div>'+renderAttributions({...panel, expectation_attributions: expectationAttributionPanel().attributions || panel.expectation_attributions || [], probe_results: expectationAttributionPanel().probe_results || panel.probe_results || []})+renderStateMachine(currentTrace, judgePanel(), panel)+
    '<div class="kv"><b>根因假设：</b>'+escapeHtml(panel.display_root_cause || '')+'</div>'+
    '<div class="kv"><b>验证步骤：</b>'+list(panel.display_verification_steps || panel.verification_steps)+'</div>'+
    '<div class="kv"><b>修改方向：</b>'+list(panel.display_patch_direction || panel.patch_direction)+'</div>';
}
function renderAll(){renderTrace(currentTrace);renderJudge(currentJudge);renderAttribute(currentAttribute)}
async function liveRun(){
  document.getElementById('status').textContent='请求业务服务中...';
  try{
    const payloadObj = payload();
    // live_schema 校验：前端手动输入是否符合 REQUEST_SHAPE
    if (!liveSchemaCheckRequest(payloadObj.project, payloadObj.input)) {
      console.warn('[live_schema] WARNING: input does not match REQUEST_SHAPE for', payloadObj.project);
    }
    const data = await post('/api/live_run', payloadObj);
    currentTrace=data;currentJudge=null;currentAttribute=null;currentCluster=null;currentView=null;
    sessionStorage.setItem(scopedKey('lastTrace'), JSON.stringify(data));
    sessionStorage.removeItem(scopedKey('lastJudge'));sessionStorage.removeItem(scopedKey('lastAttribute'));sessionStorage.removeItem(scopedKey('lastCluster'));sessionStorage.removeItem(scopedKey('lastView'));
    renderAll();
    document.getElementById('status').textContent='业务请求完成，可继续请求 Judge。';
  }catch(err){document.getElementById('status').textContent='请求失败：'+err.message}
}
async function runJudge(){
  document.getElementById('status').textContent='judge agent 分析中...';
  try{
    if(!traceMatchesCurrentInput(currentTrace)){
      currentTrace = await post('/api/live_run', payload());
      sessionStorage.setItem(scopedKey('lastTrace'), JSON.stringify(currentTrace));
    }
    const body={project:project(),trace:requireValue(currentTrace,'lastTrace')};
    const expected=expectedIntent();
    if(expected){body.expected_intent=expected;}
    const data=await post('/api/judge', body);
    currentJudge=data;currentAttribute=null;
    sessionStorage.setItem(scopedKey('lastJudge'), JSON.stringify(data));sessionStorage.removeItem(scopedKey('lastAttribute'));
    await refreshFrontendView();
    renderAll();
    document.getElementById('status').textContent='Judge 完成，可继续请求 Attribute。';
  }catch(err){document.getElementById('status').textContent='Judge 失败：'+err.message}
}
async function runAttribute(){
  document.getElementById('status').textContent='attribute agent 归因中...';
  try{
    const data=await post('/api/attribute', {project:project(),trace:requireValue(currentTrace,'lastTrace'),judge:requireValue(currentJudge,'lastJudge')});
    currentAttribute=data;sessionStorage.setItem(scopedKey('lastAttribute'), JSON.stringify(data));
    await refreshFrontendView();
    renderAll();
    document.getElementById('status').textContent='Attribute 完成。cluster 聚合请到归因总结页查看。';
  }catch(err){document.getElementById('status').textContent='Attribute 失败：'+err.message}
}
async function runChain(){
  document.getElementById('status').textContent='全链路运行中...';
  try{
    const body=payload();
    const expected=expectedIntent();
    if(expected){body.expected_intent=expected;}
    const data = await post('/api/run_chain', body);
    currentTrace=data.trace;currentJudge=data.judge;currentAttribute=data.attribute;currentCluster=data.cluster;currentView=data.frontend_view || null;
    sessionStorage.setItem(scopedKey('lastTrace'), JSON.stringify(currentTrace));
    sessionStorage.setItem(scopedKey('lastJudge'), JSON.stringify(currentJudge));
    sessionStorage.setItem(scopedKey('lastAttribute'), JSON.stringify(currentAttribute));
    if(currentCluster){sessionStorage.setItem(scopedKey('lastCluster'), JSON.stringify(currentCluster));}
    if(currentView){sessionStorage.setItem(scopedKey('lastView'), JSON.stringify(currentView));}
    sessionStorage.setItem(scopedKey('lastChain'), JSON.stringify(data));
    renderAll();
    document.getElementById('status').innerHTML='全链路完成，已保存 lastChain。<a href="summary.html">查看归因总结</a>';
  }catch(err){document.getElementById('status').textContent='全链路失败：'+err.message}
}
initProjects();
</script>
</body>
</html>
