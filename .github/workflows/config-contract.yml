name: config-contract

on:
  pull_request:
  push:

jobs:
  config-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install PyYAML pytest
      - run: python -m impl.core.config_check
      - run: python -m pytest tests/test_config_contract.py -q
