# ============================================================================
# user-side project.yaml 模板
# 位置：verifier/projects/<project_id>/project.yaml
# 作用：业务资料索引，供 evals skill 接入时 AI 分析用
# 注意：本文件不被 verifier 运行时代码硬依赖，纯 AI 资料索引
#       真正的运行时配置在 impl/projects/<id>/project.yaml
# ============================================================================

# === 必填：项目标识 ===
project_id: deerflow                    # 项目 ID（决定目录名 impl/projects/<id>）
name: 基于deerflow的营销规划                              # 显示名
description: 基于deerflow的营销规划          # AI 分析的依据

# === 1. live 系统部署 / API 调用 / 环境信息 ===
# 通过文档承载（不在 yaml 里硬填结构化字段，避免和 impl 侧重复）
# 三个字段名固定，AI 按字段名去对应文档读
live:
  startup_doc: /Users/xiaozijian/WorkSpace/package/deer-flow/deer-flow/report/deploy.sh          # 部署/启动文档（怎么跑业务系统、依赖什么、端口等）
  api_doc: /Users/xiaozijian/WorkSpace/package/deer-flow/deer-flow/report/gateway_simple.py                # API 调用文档（端点、请求参数、响应形状）
  env_doc: 暂无                # 环境变量文档（依赖配置、密钥、外部服务等）

# === 2. live 系统的文档信息（list 形式，灵活扩展）===
# 每项 {path, description}，AI 按 description 判断是否需要读
# 字段不固定，项目按实际情况增减
docs:
  - path: verifier/projects/deep-flow/project.md
    description: 项目资料
  # 按需增减，例如：
  # - path: attribution.md
  #   description: 归因方案和证据来源
  # - path: checklist.md
  #   description: 项目特有检查项

# === 3. 项目源代码位置 ===
# 业务系统源码绝对路径，供 AI 分析代码逻辑（attribute 归因时有用）
# 留空也可以，但 AI 分析能力会下降
source:
  repo: /Users/xiaozijian/WorkSpace/package/deer-flow/deer-flow

# === 4. 基础的 ready 信息 ===
# 数据流模式（接入关键决策，决定 live 如何获取 output/reference）
# 三种模式：
#   ready: []                        → 有真实服务，output 由 live 调用产生，reference 由 judge 生成
#   ready: [output, reference]       → 评估已产出数据，case 自带 output 和 reference（如上传数据集）
#   ready: [reference]               → output 走真实调用，但 reference 由你提供
ready: []

# === 5. 是否多轮/单轮 ===
# single_turn：单轮交互（一问一答）
# multi_turn：多轮交互（需在 live_schema 里定义 turns 字段，见 spec/live.md 多轮方案章节）
interaction: multi_turn
