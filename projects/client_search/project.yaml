schema_version: 1

project:
  id: client_search
  name: 客户搜索
  description: 通过自然语言生成并验证客户搜索条件

documents:
  startup:
    path: route://start.md
    type: startup
    required: true
    description: 客户搜索本地服务启动和可用性检查
  api:
    path: route://readme.md
    type: api
    required: true
    description: 客户搜索接口、请求和响应说明
  requirements:
    path: route://config.md
    type: requirements
    required: true
    description: 客户搜索字段配置与业务规则
  prompt:
    path: route://prompt.md
    type: reference
    required: true
    description: 业务系统当前提示词和语义映射资料
  judge_boundary:
    path: route://judge_boundary-template.md
    type: judge_boundary
    required: true
    description: 客户搜索可评价范围和业务边界
  judge_reference:
    path: route://judge.md
    type: reference
    required: true
    description: 客户搜索 judge 补充资料

source:
  repository: ${CLIENT_SEARCH_REPO}

onboarding:
  interaction: single_turn
  ready: []

environment:
  variables:
    CLIENT_SEARCH_REPO:
      bind: source.repository
      type: path
      required: false
      secret: false
      description: client_search 业务源码位置，仅供 evals 和 harness AI 读取
