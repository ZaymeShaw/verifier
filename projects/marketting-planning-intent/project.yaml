schema_version: 1

project:
  id: marketting-planning-intent
  name: 营销规划意图识别
  description: 单独评估营销规划服务的意图识别接口

documents:
  startup:
    path: route://start.md
    type: startup
    required: true
    description: 营销规划共享服务启动和健康检查
  api:
    path: route://readme.md
    type: api
    required: true
    description: 意图识别接口和响应说明
  requirements:
    path: route://marketplan-demand.md
    type: requirements
    required: true
    description: 营销规划意图识别业务需求
  intent_reference:
    path: route://intent.md
    type: reference
    required: true
    description: 意图标签和业务含义

source:
  repository: ${MARKETTING_PLANNING_INTENT_REPO}

onboarding:
  interaction: single_turn
  ready: [reference]

environment:
  variables:
    MARKETTING_PLANNING_INTENT_REPO:
      bind: source.repository
      type: path
      required: false
      secret: false
      description: 营销规划源码位置，仅供意图识别接入分析
