schema_version: 1

project:
  id: deerflow
  name: DeerFlow 营销规划
  description: 评估基于 DeerFlow Gateway 的多轮营销规划智能体

documents:
  startup:
    path: route://start.md
    type: startup
    required: true
    description: DeerFlow Gateway 启动、健康检查和故障排查
  api:
    path: route://live.md
    type: api
    required: true
    description: Gateway 多轮 live 请求和响应协议
  requirements:
    path: route://project.md
    type: requirements
    required: true
    description: DeerFlow 业务接入目标和测评范围
  reference:
    path: route://readme.md
    type: reference
    required: true
    description: 项目资料入口和补充说明

source:
  repository: ${DEERFLOW_REPO}

onboarding:
  interaction: multi_turn
  ready: []

environment:
  variables:
    DEERFLOW_REPO:
      bind: source.repository
      type: path
      required: true
      secret: false
      description: deer-flow 业务源码位置，供接入分析和本地启动使用
