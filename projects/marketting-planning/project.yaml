schema_version: 1

project:
  id: marketting-planning
  name: 营销规划
  description: 评估多轮、阶段化、SSE 输出的营销规划智能体

documents:
  startup:
    path: start.md
    type: startup
    required: true
    description: 营销规划服务启动和健康检查
  api:
    path: readme.md
    type: api
    required: true
    description: 营销规划 SSE 接口、请求和响应说明
  requirements:
    path: marketplan-demand.md
    type: requirements
    required: true
    description: 营销规划业务目标和核心场景

source:
  repository: ${MARKETTING_PLANNING_REPO}

onboarding:
  interaction: multi_turn
  ready: []

environment:
  variables:
    MARKETTING_PLANNING_REPO:
      bind: source.repository
      type: path
      required: false
      secret: false
      description: 营销规划业务源码位置，仅供 evals 和 harness AI 读取
